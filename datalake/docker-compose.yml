services:
  # 1. MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks: [datalake-network]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s

  # 2. PostgreSQL (Hive Metastore 백엔드 DB)
  postgres:
    image: postgres:15
    container_name: postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [datalake-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 3. Hive Metastore (Standalone)
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    ports: ["9083:9083"]
    volumes:
      - ../drivers/postgresql-42.7.3.jar:/opt/hive/lib/postgresql.jar  # ← 추가
      - ../drivers/hadoop-aws-3.3.4.jar:/opt/hive/lib/hadoop-aws.jar          # ← 추가
      - ../drivers/aws-java-sdk-bundle-1.12.262.jar:/opt/hive/lib/aws-java-sdk-bundle.jar  # ← 추가
    environment:
      AWS_ACCESS_KEY_ID: minioadmin       # ← 추가
      AWS_SECRET_ACCESS_KEY: minioadmin   # ← 추가
      AWS_REGION: us-east-1              # ← 추가
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
        -Dhive.metastore.warehouse.dir=s3a://warehouse/
        -Dfs.s3a.endpoint=http://minio:9000
        -Dfs.s3a.access.key=minioadmin
        -Dfs.s3a.secret.key=minioadmin
        -Dfs.s3a.path.style.access=true
        -Dfs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        -Dfs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [datalake-network]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat /dev/null > /dev/tcp/localhost/9083'"]
      # test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s  # 첫 실행 시 schematool -initSchema 수행으로 오래 걸림

  # 4. Kudu Master
  kudu-master:
    image: apache/kudu:latest
    container_name: kudu-master
    user: root
    ports: ["8050:8050", "7050:7050"]
    volumes:
      - kudu-master-data:/var/lib/kudu/master
    command: ["master"]
    environment:
      MASTER_ARGS: >-
        --unlock_unsafe_flags
        --use_hybrid_clock=false
        --fs_wal_dir=/var/lib/kudu/master
        --rpc_bind_addresses=0.0.0.0:7050
        --rpc_advertised_addresses=kudu-master:7050
    networks: [datalake-network]

  # 5. Kudu Tablet Server
  kudu-tserver:
    image: apache/kudu:latest
    container_name: kudu-tserver
    user: root
    ports: ["8051:8051", "7051:7051"]
    volumes:
      - kudu-tserver-data:/var/lib/kudu/tserver
    command: ["tserver"]
    environment:
      TSERVER_ARGS: >-
        --unlock_unsafe_flags
        --use_hybrid_clock=false
        --tserver_master_addrs=kudu-master:7050
        --fs_wal_dir=/var/lib/kudu/tserver
        --rpc_bind_addresses=0.0.0.0:7051
        --rpc_advertised_addresses=kudu-tserver:7051
    depends_on: [kudu-master]
    networks: [datalake-network]

  # 8. Apache Spark Master
  spark:
    image: apache/spark:3.5.0
    container_name: spark
    user: root
    ports: ["8080:8080", "7077:7077"]
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    networks: [datalake-network]

  # 8-1. Spark Connect Server
  spark-connect:
    image: apache/spark:3.5.0
    container_name: spark-connect
    user: root
    ports:
      - "15002:15002"
    volumes:
      # 1. Jar 파일 캐싱: 패키지 재다운로드 방지 (속도 향상)
      - spark-ivy-cache:/root/.ivy2
      # 2. 데이터 공유: 로컬의 CSV 파일 등을 컨테이너 내에서 참조할 경우
      - ./data:/opt/spark/data
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_DRIVER_MEMORY=2g
      - SPARK_EXECUTOR_MEMORY=2g
      - _JAVA_OPTIONS=-Xmx2g
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin        # MinIO 접속 키
      - AWS_SECRET_ACCESS_KEY=minioadmin    # MinIO 시크릿
    depends_on:
      hive-metastore:
        condition: service_healthy
    networks: [datalake-network]
    command: >
      /opt/spark/sbin/start-connect-server.sh
      --packages org.apache.spark:spark-connect_2.12:3.5.0,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0,org.apache.iceberg:iceberg-aws-bundle:1.5.0
      --conf spark.jars.repositories=https://repo1.maven.org/maven2
      --conf spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
      --conf spark.sql.catalog.hive=org.apache.iceberg.spark.SparkCatalog
      --conf spark.sql.catalog.hive.type=hive
      --conf spark.sql.catalog.hive.uri=thrift://hive-metastore:9083
      --conf spark.sql.catalog.hive.warehouse=s3a://warehouse/
      --conf spark.sql.catalog.hive.io-impl=org.apache.iceberg.aws.s3.S3FileIO
      --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
      --conf spark.hadoop.fs.s3a.access.key=minioadmin
      --conf spark.hadoop.fs.s3a.secret.key=minioadmin
      --conf spark.hadoop.fs.s3a.path.style.access=true
      --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      --conf spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
      --conf spark.sql.catalog.hive.s3.endpoint=http://minio:9000
      --conf spark.sql.catalog.hive.s3.path-style-access=true
      --conf spark.sql.catalog.hive.s3.access-key-id=minioadmin
      --conf spark.sql.catalog.hive.s3.secret-access-key=minioadmin
      --conf spark.sql.catalog.hive.lock-impl=org.apache.iceberg.hive.NoLockManager
networks:
  datalake-network:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  kudu-master-data:
  kudu-tserver-data:
  spark-ivy-cache: